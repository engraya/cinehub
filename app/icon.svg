<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Clapperboard body (lower section) -->
  <rect x="4" y="15" width="24" height="13" rx="2.5" fill="#f1f5f9"/>

  <!-- Film perforations on body -->
  <rect x="6.5" y="18" width="2.5" height="3.5" rx="0.75" fill="#64748b"/>
  <rect x="14.75" y="18" width="2.5" height="3.5" rx="0.75" fill="#64748b"/>
  <rect x="23" y="18" width="2.5" height="3.5" rx="0.75" fill="#64748b"/>

  <!-- Script line on body -->
  <rect x="6.5" y="24.5" width="19" height="1.5" rx="0.75" fill="#94a3b8"/>

  <!-- Clapper arm (upper section) -->
  <rect x="4" y="7" width="24" height="9" rx="2.5" fill="#1e293b"/>

  <!-- Diagonal stripes on clapper arm -->
  <clipPath id="cp">
    <rect x="4" y="7" width="24" height="9" rx="2.5"/>
  </clipPath>
  <g clip-path="url(#cp)">
    <!-- Amber stripes (diagonal: shift left 9px from top to bottom) -->
    <polygon points="4,7 10,7 1,16 -5,16"  fill="#f59e0b"/>
    <polygon points="16,7 22,7 13,16 7,16"  fill="#f59e0b"/>
    <polygon points="28,7 34,7 25,16 19,16" fill="#f59e0b"/>
  </g>
</svg>
